apiVersion: v1
kind: Service
metadata:
  name: {{ include "cerebro.fullname" . }}-api
  labels:
    {{- include "cerebro.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cerebro.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
{{- if .Values.reranker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cerebro.fullname" . }}-reranker
  labels:
    {{- include "cerebro.labels" . | nindent 4 }}
    app.kubernetes.io/component: reranker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.reranker.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cerebro.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: reranker
{{- end }}
