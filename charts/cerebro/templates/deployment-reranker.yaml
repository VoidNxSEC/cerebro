{{- if .Values.reranker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cerebro.fullname" . }}-reranker
  labels:
    {{- include "cerebro.labels" . | nindent 4 }}
    app.kubernetes.io/component: reranker
spec:
  replicas: {{ .Values.reranker.replicaCount }}
  selector:
    matchLabels:
      {{- include "cerebro.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reranker
  template:
    metadata:
      labels:
        {{- include "cerebro.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reranker
    spec:
      serviceAccountName: {{ include "cerebro.serviceAccountName" . }}
      containers:
        - name: cerebro-reranker
          image: "{{ .Values.reranker.image.repository }}:{{ .Values.reranker.image.tag }}"
          imagePullPolicy: {{ .Values.reranker.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.reranker.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.reranker.resources | nindent 12 }}
      {{- with .Values.reranker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
