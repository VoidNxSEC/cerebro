apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cerebro.fullname" . }}-config
  labels:
    {{- include "cerebro.labels" . | nindent 4 }}
data:
  CEREBRO_LLM_PROVIDER: {{ .Values.cerebro.llmProvider | quote }}
  CEREBRO_VECTOR_STORE_PROVIDER: {{ .Values.cerebro.vectorStoreProvider | quote }}
  CEREBRO_VECTOR_STORE_NAMESPACE: {{ .Values.cerebro.namespace | quote }}
  NATS_URL: {{ .Values.nats.url | quote }}
  CEREBRO_RERANKER_URL: {{ printf "http://%s-reranker:%d" (include "cerebro.fullname" .) (.Values.reranker.port | int) | quote }}
  CEREBRO_JSON_LOGS: "1"
  {{- range $k, $v := .Values.cerebro.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
