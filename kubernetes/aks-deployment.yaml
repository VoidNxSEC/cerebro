apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerebro-api
  labels:
    app: cerebro
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cerebro
      tier: backend
  template:
    metadata:
      labels:
        app: cerebro
        tier: backend
    spec:
      containers:
        - name: cerebro-api
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: cerebro-env
          ports:
            - containerPort: 8000
              name: api
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
