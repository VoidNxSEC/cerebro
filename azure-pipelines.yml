trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  CI: "true"
  vmImage: "ubuntu-24.04"
  imageRepository: "cerebro"
  encryptedSecretsFile: "secrets/cerebro.enc.env"
  decryptedSecretsFile: "$(Pipeline.Workspace)/secrets/cerebro.env"
  testResultsDir: "$(Build.ArtifactStagingDirectory)/test-results"
  securityReportsDir: "$(Build.ArtifactStagingDirectory)/security"
  ENABLE_AZURE_DEPLOY: "false"

stages:
  - stage: Validate
    displayName: Validate
    jobs:
      - job: quality
        displayName: Backend, CLI, and Dashboard
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
            fetchDepth: 0

          - bash: |
              set -euo pipefail
              curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon
              echo "##vso[task.prependpath]$HOME/.nix-profile/bin"
            displayName: Install Nix

          - bash: |
              set -euo pipefail
              . "$HOME/.nix-profile/etc/profile.d/nix.sh"
              export NIX_CONFIG="experimental-features = nix-command flakes"
              nix --version
              nix flake metadata
            displayName: Bootstrap Flake

          - bash: |
              set -euo pipefail
              . "$HOME/.nix-profile/etc/profile.d/nix.sh"
              export NIX_CONFIG="experimental-features = nix-command flakes"
              export TEST_RESULTS_DIR="$(testResultsDir)"
              export COVERAGE_FILE="$(Build.SourcesDirectory)/coverage.xml"
              mkdir -p "$TEST_RESULTS_DIR"

              nix develop --command bash -lc '
                poetry check --lock
                ruff check src/ tests/
                mypy src/cerebro --ignore-missing-imports
                pytest tests/ -v --ignore=tests/integration \
                  --cov=src/cerebro \
                  --cov-report=xml:"$COVERAGE_FILE" \
                  --junitxml="$TEST_RESULTS_DIR/pytest.xml"
                cerebro --help >/dev/null
                cerebro info
                cd dashboard
                npm ci
                npm run lint
                npm run type-check
                npm run build
              '
            displayName: Run project checks with nix develop --command

          - task: PublishTestResults@2
            displayName: Publish pytest results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "$(testResultsDir)/pytest.xml"
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish coverage
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: "$(Build.SourcesDirectory)/coverage.xml"
              pathToSources: "$(Build.SourcesDirectory)/src"
              failIfCoverageEmpty: true

      - job: security
        displayName: Security and Supply Chain
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
            fetchDepth: 0

          - bash: |
              set -euo pipefail
              curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon
              echo "##vso[task.prependpath]$HOME/.nix-profile/bin"
            displayName: Install Nix

          - bash: |
              set -euo pipefail
              . "$HOME/.nix-profile/etc/profile.d/nix.sh"
              export NIX_CONFIG="experimental-features = nix-command flakes"
              export SECURITY_REPORTS_DIR="$(securityReportsDir)"
              mkdir -p "$SECURITY_REPORTS_DIR"

              nix develop --command bash -lc '
                status=0

                poetry check --lock || status=$?
                pip-audit --local --format json --output "$SECURITY_REPORTS_DIR/pip-audit.json" || status=$?
                gitleaks detect --no-banner --redact --source . \
                  --report-format sarif \
                  --report-path "$SECURITY_REPORTS_DIR/gitleaks.sarif" || status=$?
                syft dir:. -o cyclonedx-json > "$SECURITY_REPORTS_DIR/sbom.cyclonedx.json" || status=$?

                cd dashboard
                npm ci
                npm audit --audit-level=high --json > "$SECURITY_REPORTS_DIR/npm-audit.json" || status=$?

                exit "$status"
              '
            displayName: Run security scanners with nix develop --command

          - publish: "$(securityReportsDir)"
            artifact: security-reports
            displayName: Publish security reports
            condition: always()

  - stage: Deploy
    displayName: Deploy
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['ENABLE_AZURE_DEPLOY'], 'true'))
    jobs:
      - job: container_app
        displayName: Deploy to Azure Container Apps
        pool:
          vmImage: $(vmImage)
        steps:
          - checkout: self
            fetchDepth: 0

          - bash: |
              set -euo pipefail
              curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon
              echo "##vso[task.prependpath]$HOME/.nix-profile/bin"
            displayName: Install Nix

          - task: AzureCLI@2
            displayName: Build and push image to Azure Container Registry
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr build \
                  --registry "$(ACR_NAME)" \
                  --image "$(imageRepository):$(Build.BuildId)" \
                  .

          - bash: |
              set -euo pipefail
              . "$HOME/.nix-profile/etc/profile.d/nix.sh"
              export NIX_CONFIG="experimental-features = nix-command flakes"
              export SOPS_AGE_KEY="$(SOPS_AGE_KEY)"
              mkdir -p "$(Pipeline.Workspace)/secrets"

              nix develop --command bash -lc '
                sops decrypt \
                  --output "$(decryptedSecretsFile)" \
                  "$(encryptedSecretsFile)"
              '
            displayName: Decrypt SOPS environment
            env:
              SOPS_AGE_KEY: $(SOPS_AGE_KEY)

          - task: AzureCLI@2
            displayName: Update Azure Container App revision
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az extension add --name containerapp --upgrade
                az containerapp show \
                  --name "$(CONTAINER_APP_NAME)" \
                  --resource-group "$(AZURE_RESOURCE_GROUP)" \
                  >/dev/null

                mapfile -t env_vars < <(grep -v '^\s*#' "$(decryptedSecretsFile)" | sed '/^\s*$/d')

                az containerapp update \
                  --name "$(CONTAINER_APP_NAME)" \
                  --resource-group "$(AZURE_RESOURCE_GROUP)" \
                  --image "$(ACR_LOGIN_SERVER)/$(imageRepository):$(Build.BuildId)" \
                  --set-env-vars "${env_vars[@]}"
